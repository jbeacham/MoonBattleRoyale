  // Enemies (only show nearby ones)
  for (const e of enemies) {
    if (!e.alive) continue;
    if (dist(player, e) < 500) {
      miniCtx.beginPath();
      miniCtx.arc(e.x * scale, e.y * scale, 2, 0, Math.PI * 2);
      miniCtx.fillStyle = CONFIG.ENEMY_COLOR;
      miniCtx.fill();
    }
  }

  // Player
  if (player.alive) {
    miniCtx.beginPath();
    miniCtx.arc(player.x * scale, player.y * scale, 3, 0, Math.PI * 2);
    miniCtx.fillStyle = CONFIG.PLAYER_COLOR;
    miniCtx.fill();
  }

  // Vehicles on minimap
  for (const v of vehicles) {
    if (!v.alive) continue;
    miniCtx.fillStyle = v.driver ? '#ffaa00' : '#44aaff';
    miniCtx.fillRect(v.x * scale - 2, v.y * scale - 1.5, 4, 3);
  }

  // Boss on minimap
  if (boss && boss.alive) {
    miniCtx.fillStyle = '#ff0000';
    miniCtx.beginPath();
    miniCtx.arc(boss.x * scale, boss.y * scale, 4, 0, Math.PI * 2);
    miniCtx.fill();
    // Pulsing ring
    miniCtx.strokeStyle = `rgba(255,0,0,${0.3 + Math.sin(frameCount * 0.1) * 0.3})`;
    miniCtx.lineWidth = 1;
    miniCtx.beginPath();
    miniCtx.arc(boss.x * scale, boss.y * scale, 6, 0, Math.PI * 2);
    miniCtx.stroke();
  }

  // Camera viewport
  miniCtx.strokeStyle = 'rgba(255,255,255,0.3)';
  miniCtx.strokeRect(camera.x * scale, camera.y * scale, W * scale, H * scale);
}

function updateHUD() {
  document.getElementById('hud-health-text').textContent = Math.max(0, Math.ceil(player.hp));
  document.getElementById('hud-health-bar').style.width = Math.max(0, (player.hp / player.maxHp) * 100) + '%';
  document.getElementById('hud-health-bar').style.background =
    player.hp > 30 ? 'linear-gradient(90deg, #00ff88, #00cc66)' : 'linear-gradient(90deg, #ff4444, #cc2222)';
  const hudW = WEAPONS[player.weapon];
  document.getElementById('hud-weapon').textContent = hudW.name;
  document.getElementById('hud-weapon').style.color = hudW.color;
  document.getElementById('hud-ammo').textContent = player.reloading ? 'Reloading...' : player.ammo;
  document.getElementById('hud-kills').textContent = kills;
  // Vehicle HUD
  const vHud = document.getElementById('hud-vehicle');
  if (player.inVehicle && player.inVehicle.alive) {
    vHud.style.display = 'block';
    const vd = VEHICLES[player.inVehicle.type];
    document.getElementById('hud-vehicle-name').textContent = vd.name;
    document.getElementById('hud-vehicle-hp').textContent = Math.ceil(player.inVehicle.hp);
  } else {
    vHud.style.display = 'none';
  }
}

function gameLoop() {
  if (gameState !== 'playing') return;

  frameCount++;
  ctx.clearRect(0, 0, W, H);

  // Update camera to follow player
  camera.x += (player.x - W / 2 - camera.x) * 0.1;
  camera.y += (player.y - H / 2 - camera.y) * 0.1;

  updatePlayer();
  updateEnemies();
  updateBullets();
  updateBoss();
  updateZone();
  updateParticles();
  checkWin();

  // Draw everything
  drawGround();
  drawZone();
  drawObstacles();
  drawPickups();
  drawVehicles();
  drawBullets();
  for (const e of enemies) { if (!e.inVehicle) drawSoldier(e); }
  if (!player.inVehicle) drawSoldier(player);
  drawBoss();
  drawParticles();
  drawMinimap();
  updateHUD();

  requestAnimationFrame(gameLoop);
}

// ==================== MOBILE CONTROLS ====================
let mobileMode = false;

// Auto-detect mobile on page load
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.getElementById('mobile-mode-toggle').checked = true;
  toggleMobileMode(true);
}

function toggleMobileMode(enabled) {
  mobileMode = enabled;
  const mc = document.getElementById('mobile-controls');
  const ct = document.getElementById('controls-text');
  const mm = document.getElementById('minimap');
  if (enabled) {
    mc.classList.add('active');
    ct.innerHTML = '<span>Joystick</span> Move &nbsp;|&nbsp; <span>Tap</span> anywhere to shoot in that direction';
    mm.style.display = 'none'; // hidden until MAP button tapped
    document.body.style.cursor = 'default';
  } else {
    mc.classList.remove('active');
    ct.innerHTML = '<span>WASD</span> Move &nbsp;|&nbsp; <span>Mouse</span> Aim &nbsp;|&nbsp; <span>Click</span> Shoot<br><span>R</span> Reload &nbsp;|&nbsp; <span>Shift</span> Sprint &nbsp;|&nbsp; <span>E</span> Enter/Exit Vehicle';
    mm.style.display = 'block';
    document.body.style.cursor = 'crosshair';
  }
}

// --- Joystick logic ---
(function() {
  const zone = document.getElementById('joystick-zone');
  const base = document.getElementById('joystick-base');
  const stick = document.getElementById('joystick-stick');
  const reloadBtn = document.getElementById('mobile-reload-btn');
  const vehicleBtn = document.getElementById('mobile-vehicle-btn');

  let joystickTouchId = null;
  let joystickCenterX = 0, joystickCenterY = 0;
  const JOYSTICK_RADIUS = 50;

  function getJoystickCenter() {
    const rect = base.getBoundingClientRect();
    return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
  }

  zone.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (joystickTouchId !== null) return;
    const t = e.changedTouches[0];
    joystickTouchId = t.identifier;
    const c = getJoystickCenter();
    joystickCenterX = c.x;
    joystickCenterY = c.y;
    handleJoystickMove(t.clientX, t.clientY);
  }, { passive: false });

  zone.addEventListener('touchmove', function(e) {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      if (t.identifier === joystickTouchId) {
        handleJoystickMove(t.clientX, t.clientY);
      }
    }
  }, { passive: false });

  zone.addEventListener('touchend', function(e) {
    for (let i = 0; i < e.changedTouches.length; i++) {
      if (e.changedTouches[i].identifier === joystickTouchId) {
        joystickTouchId = null;
        resetJoystick();
      }
    }
  });
  zone.addEventListener('touchcancel', function(e) {
    joystickTouchId = null;
    resetJoystick();
  });

  function handleJoystickMove(tx, ty) {
    let dx = tx - joystickCenterX;
    let dy = ty - joystickCenterY;
    const d = Math.hypot(dx, dy);
    if (d > JOYSTICK_RADIUS) {
      dx = (dx / d) * JOYSTICK_RADIUS;
      dy = (dy / d) * JOYSTICK_RADIUS;
    }
    stick.style.transform = `translate(${dx}px, ${dy}px)`;

    // Map joystick to WASD keys
    const threshold = 0.25;
    const nx = dx / JOYSTICK_RADIUS;
    const ny = dy / JOYSTICK_RADIUS;

    if (typeof keys !== 'undefined') {
      keys['w'] = ny < -threshold;
      keys['s'] = ny > threshold;
      keys['a'] = nx < -threshold;
      keys['d'] = nx > threshold;
      // Sprint if pushed to edge
      keys['shift'] = d > JOYSTICK_RADIUS * 0.85;
    }
  }

  function resetJoystick() {
    stick.style.transform = 'translate(0px, 0px)';
    if (typeof keys !== 'undefined') {
      keys['w'] = false;
      keys['s'] = false;
      keys['a'] = false;
      keys['d'] = false;
      keys['shift'] = false;
    }
  }

  // --- Reload button ---
  reloadBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (typeof player !== 'undefined' && player && player.alive && !player.reloading) {
      player.reloading = true;
      player.reloadStart = Date.now();
    }
  }, { passive: false });

  // --- Vehicle button ---
  vehicleBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    // Simulate pressing 'e'
    const evt = new KeyboardEvent('keydown', { key: 'e' });
    document.dispatchEvent(evt);
  }, { passive: false });

  // --- Map toggle button ---
  const mapBtn = document.getElementById('mobile-map-btn');
  mapBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    const mm = document.getElementById('minimap');
    if (mm.style.display === 'none') {
      mm.style.display = 'block';
      mm.style.bottom = '115px';
      mm.style.right = '16px';
    } else {
      mm.style.display = 'none';
    }
  }, { passive: false });
})();

// --- Mobile tap-to-shoot: tap anywhere (not on a control) to aim & fire ---
let mobileShooting = false;
let mobileShootInterval = null;

document.addEventListener('touchstart', function(e) {
  if (!mobileMode || typeof player === 'undefined' || !player || !player.alive || gameState !== 'playing') return;

  // Ignore touches on UI controls (joystick, buttons, HUD, screens)
  const t = e.target;
  if (t.closest('#joystick-zone, #mobile-reload-btn, #mobile-vehicle-btn, #mobile-map-btn, #mobile-controls .mobile-action-btn, #start-screen, #win-screen, #lose-screen, #hud, .btn, .diff-btn, .mobile-toggle, #minimap')) return;

  const touch = e.changedTouches[0];
  aimAtScreenPoint(touch.clientX, touch.clientY);

  // Start continuous fire
  mouse.down = true;
  mobileShooting = true;
}, { passive: true });

document.addEventListener('touchmove', function(e) {
  if (!mobileMode || !mobileShooting) return;
  // Update aim as finger drags
  for (let i = 0; i < e.changedTouches.length; i++) {
    const touch = e.changedTouches[i];
    aimAtScreenPoint(touch.clientX, touch.clientY);
  }
}, { passive: true });

document.addEventListener('touchend', function(e) {
  if (!mobileMode || !mobileShooting) return;
  mobileShooting = false;
  mouse.down = false;
}, { passive: true });

document.addEventListener('touchcancel', function(e) {
  if (!mobileMode) return;
  mobileShooting = false;
  mouse.down = false;
}, { passive: true });

function aimAtScreenPoint(screenX, screenY) {
  if (typeof camera === 'undefined' || typeof player === 'undefined') return;
  // Convert screen tap to world coordinates, then aim there
  const worldX = screenX + camera.x;
  const worldY = screenY + camera.y;
  player.angle = Math.atan2(worldY - player.y, worldX - player.x);
  mouse.x = screenX;
  mouse.y = screenY;
}
</script>
